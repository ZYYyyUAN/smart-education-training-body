# 开发环境配置
# 禁用Pinecone向量数据库，使用内存存储

# 向量存储配置
xiaozhi.vector-store.enabled=false
xiaozhi.vector-store.type=memory

# 日志配置
logging.level.com.atguigu.java.ai.langchain4j.config.EmbeddingStoreConfig=DEBUG
logging.level.dev.langchain4j.store.embedding=DEBUG

# 开发模式
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
