server.port=8080
# OpenAI demo (not used in production)
langchain4j.open-ai.chat-model.base-url=http://langchain4j.dev/demo/openai/v1
langchain4j.open-ai.chat-model.api-key=demo
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
# logging
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true
logging.level.root=INFO
logging.level.dev.langchain4j=INFO

# ollama
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=deepseek-r1:1.5b
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/chat_memory_db4}

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/xiaozhi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Tongyi / DashScope (Qwen)
langchain4j.community.dashscope.chat-model.api-key=${TONGYI_API_KEY:sk-ed34bb7ebb674754a642e6bd3fecdca2}
langchain4j.community.dashscope.chat-model.model-name=qwen-plus
langchain4j.community.dashscope.embedding-model.api-key=${TONGYI_API_KEY:sk-ed34bb7ebb674754a642e6bd3fecdca2}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v4
langchain4j.community.dashscope.streaming-chat-model.api-key=${TONGYI_API_KEY:sk-ed34bb7ebb674754a642e6bd3fecdca2}
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.id-type=ASSIGN_ID
mybatis-plus.global-config.worker-id=1
mybatis-plus.global-config.datacenter-id=1

# Alibaba Cloud OSS
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
aliyun.oss.accessKeyId=${ALIYUN_OSS_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucketName=${ALIYUN_OSS_BUCKET_NAME:xiaozhi6667}
aliyun.oss.fileHost=xiaozhi/resources

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

