# ============================================================
# 生产环境配置
# 所有敏感信息必须通过环境变量注入，不提供默认值
# ============================================================
server.port=${SERVER_PORT:8080}

# 数据库配置
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MongoDB配置
spring.data.mongodb.uri=${MONGODB_URI}

# MyBatis Plus配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.id-type=ASSIGN_ID
mybatis-plus.global-config.worker-id=1
mybatis-plus.global-config.datacenter-id=1

# 通义千问配置 (必须通过环境变量 TONGYI_API_KEY 注入)
langchain4j.community.dashscope.chat-model.api-key=${TONGYI_API_KEY}
langchain4j.community.dashscope.chat-model.model-name=qwen-plus
langchain4j.community.dashscope.embedding-model.api-key=${TONGYI_API_KEY}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v4
langchain4j.community.dashscope.streaming-chat-model.api-key=${TONGYI_API_KEY}
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus

# 阿里云OSS配置 (必须通过环境变量注入)
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT}
aliyun.oss.accessKeyId=${ALIYUN_OSS_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucketName=${ALIYUN_OSS_BUCKET_NAME}
aliyun.oss.fileHost=xiaozhi/resources

# 科大讯飞语音配置 (必须通过环境变量注入)
xfyun.app-id=${XFYUN_APP_ID}
xfyun.api-key=${XFYUN_API_KEY}

# 科大讯飞OCR配置 (必须通过环境变量注入)
xunfei.ocr.app-id=${XUNFEI_OCR_APP_ID}
xunfei.ocr.api-key=${XUNFEI_OCR_API_KEY}
xunfei.ocr.api-secret=${XUNFEI_OCR_API_SECRET}
xunfei.ocr.api-url=https://api.xf-yun.com/v1/private/sf8e6aca1
xunfei.ocr.host=api.xf-yun.com

# 科大讯飞TTS语音合成配置 (必须通过环境变量注入)
xfyun.tts.app-id=${XFYUN_APP_ID}
xfyun.tts.api-key=${XFYUN_TTS_API_KEY}
xfyun.tts.api-secret=${XFYUN_TTS_API_SECRET}

# 科大讯飞IAT语音识别配置 (必须通过环境变量注入)
xfyun.iat.app-id=${XFYUN_IAT_APP_ID}
xfyun.iat.api-key=${XFYUN_IAT_API_KEY}
xfyun.iat.api-secret=${XFYUN_IAT_API_SECRET}

# 文件上传配置
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 日志配置
logging.level.root=INFO
logging.level.com.atguigu.java.ai.langchain4j=INFO
logging.level.dev.langchain4j=INFO
logging.file.name=/app/logs/smart-education.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 字符编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# 应用配置
spring.main.allow-bean-definition-overriding=true

# Neo4j配置 (必须通过环境变量注入)
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# Pinecone向量存储 (必须通过环境变量注入)
pinecone.apiKey=${PINECONE_API_KEY}

# 向量存储配置
xiaozhi.vector-store.enabled=false
xiaozhi.vector-store.type=memory

# 健康检查配置
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.mongo.enabled=true
