version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: smart-education-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xiaozhi}
      MYSQL_USER: ${MYSQL_USER:-xiaozhi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xiaozhi123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - smart-education-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # MongoDB数据库
  mongodb:
    image: mongo:7.0
    container_name: smart-education-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123456}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-chat_memory_db4}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-scripts/mongodb:/docker-entrypoint-initdb.d
    networks:
      - smart-education-network


  # Spring Boot应用
  app:
    build: .
    container_name: smart-education-app
    restart: unless-stopped
    depends_on:
      - mysql
      - mongodb
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xiaozhi}
      MYSQL_USERNAME: ${MYSQL_USER:-xiaozhi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xiaozhi123}
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ${MONGO_DATABASE:-chat_memory_db4}
      # AI服务配置
      TONGYI_API_KEY: ${TONGYI_API_KEY}
      XUNFEI_APP_ID: ${XUNFEI_APP_ID}
      XUNFEI_API_KEY: ${XUNFEI_API_KEY}
      XUNFEI_API_SECRET: ${XUNFEI_API_SECRET}
      # 阿里云OSS配置
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME}
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - smart-education-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: smart-education-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    networks:
      - smart-education-network

volumes:
  mysql_data:
  mongodb_data:
  app_logs:
  nginx_logs:

networks:
  smart-education-network:
    driver: bridge
