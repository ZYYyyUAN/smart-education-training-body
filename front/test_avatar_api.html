<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头像API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            border: 1px solid #ddd;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }
        .test-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .log-area {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .message-item {
            border: 1px solid #ccc;
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .avatar-preview {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }
        .avatar-fallback {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>头像API测试</h1>
    
    <div class="test-section">
        <h3>测试说明</h3>
        <p>测试后端聊天记录API是否正确返回头像数据：</p>
        <ul>
            <li>✅ 测试聊天记录API响应</li>
            <li>✅ 检查是否包含senderAvatar字段</li>
            <li>✅ 验证头像URL是否有效</li>
            <li>✅ 显示头像预览</li>
        </ul>
    </div>

    <div class="test-section">
        <h3>测试操作</h3>
        <button class="test-button" onclick="testChatHistoryAPI()">测试聊天记录API</button>
        <button class="test-button" onclick="testUserProfileAPI()">测试用户资料API</button>
        <button class="test-button" onclick="clearLog()">清空日志</button>
    </div>

    <div class="test-section">
        <h3>当前状态</h3>
        <div id="status" class="status info">准备开始测试...</div>
    </div>

    <div class="test-section">
        <h3>API响应结果</h3>
        <div id="results"></div>
    </div>

    <div class="test-section">
        <h3>测试日志</h3>
        <div id="log" class="log-area"></div>
    </div>

    <script>
        let logElement;
        let statusElement;
        let resultsElement;

        window.addEventListener('DOMContentLoaded', function() {
            logElement = document.getElementById('log');
            statusElement = document.getElementById('status');
            resultsElement = document.getElementById('results');
            
            log('测试页面已加载，开始测试头像API...');
        });

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            statusElement.className = `status ${type}`;
            statusElement.textContent = message;
        }

        async function testChatHistoryAPI() {
            log('=== 测试聊天记录API ===');
            updateStatus('正在测试聊天记录API...', 'info');
            
            try {
                // 测试课程ID为1的聊天记录
                const response = await fetch('/api/chat/history?courseId=1&limit=10&offset=0', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                log(`API响应状态: ${response.status}`);
                log(`响应数据结构: ${JSON.stringify(data, null, 2)}`);
                
                if (data.data && Array.isArray(data.data)) {
                    log(`获取到 ${data.data.length} 条聊天记录`);
                    
                    // 显示每条消息的详细信息
                    resultsElement.innerHTML = '<h4>聊天记录详情：</h4>';
                    data.data.forEach((message, index) => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'message-item';
                        
                        const hasAvatar = message.senderAvatar && message.senderAvatar.trim() !== '';
                        const avatarHtml = hasAvatar 
                            ? `<img src="${message.senderAvatar}" alt="${message.senderName}" class="avatar-preview" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />`
                            : '';
                        const fallbackHtml = `<div class="avatar-fallback">${message.senderName ? message.senderName.charAt(0) : 'U'}</div>`;
                        
                        messageDiv.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                ${avatarHtml}
                                ${fallbackHtml}
                                <div>
                                    <strong>发送者:</strong> ${message.senderName || '未知'}<br>
                                    <strong>头像URL:</strong> ${message.senderAvatar || '无'}<br>
                                    <strong>消息内容:</strong> ${message.message || '无'}<br>
                                    <strong>消息类型:</strong> ${message.messageType || 'text'}<br>
                                    <strong>发送时间:</strong> ${message.sentAt || '无'}
                                </div>
                            </div>
                        `;
                        
                        resultsElement.appendChild(messageDiv);
                    });
                    
                    // 统计头像情况
                    const withAvatar = data.data.filter(msg => msg.senderAvatar && msg.senderAvatar.trim() !== '').length;
                    const withoutAvatar = data.data.length - withAvatar;
                    
                    log(`头像统计: 有头像 ${withAvatar} 条，无头像 ${withoutAvatar} 条`);
                    updateStatus(`API测试完成: 有头像 ${withAvatar} 条，无头像 ${withoutAvatar} 条`, 'success');
                } else {
                    log('❌ 响应数据格式不正确');
                    updateStatus('响应数据格式不正确', 'error');
                }
            } catch (error) {
                log(`❌ API测试失败: ${error.message}`);
                updateStatus(`API测试失败: ${error.message}`, 'error');
            }
        }

        async function testUserProfileAPI() {
            log('=== 测试用户资料API ===');
            updateStatus('正在测试用户资料API...', 'info');
            
            try {
                const response = await fetch('/api/user/profile', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                log(`用户资料API响应: ${JSON.stringify(data, null, 2)}`);
                
                if (data.data && data.data.avatarUrl) {
                    log(`✅ 用户头像URL: ${data.data.avatarUrl}`);
                    updateStatus(`用户头像URL: ${data.data.avatarUrl}`, 'success');
                } else {
                    log('❌ 用户资料中没有头像URL');
                    updateStatus('用户资料中没有头像URL', 'error');
                }
            } catch (error) {
                log(`❌ 用户资料API测试失败: ${error.message}`);
                updateStatus(`用户资料API测试失败: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            logElement.innerHTML = '';
            resultsElement.innerHTML = '';
            updateStatus('日志已清空', 'info');
        }
    </script>
</body>
</html>
