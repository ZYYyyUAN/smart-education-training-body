<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群聊未读消息行为测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            border: 1px solid #ddd;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }
        .test-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .test-button.danger {
            background: #dc3545;
        }
        .test-button.danger:hover {
            background: #c82333;
        }
        .test-button.success {
            background: #28a745;
        }
        .test-button.success:hover {
            background: #218838;
        }
        .log-area {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .chat-simulation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .chat-window {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background: #f9f9f9;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin: -15px -15px 15px -15px;
            text-align: center;
        }
        .message {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .message.sent {
            background: #dcf8c6;
            margin-left: 20px;
        }
        .message.received {
            background: white;
            margin-right: 20px;
        }
        .unread-badge {
            background: #ff4d4f;
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <h1>群聊未读消息行为测试</h1>
    
    <div class="test-section">
        <h3>测试目标</h3>
        <p>验证群聊未读消息的正确行为：</p>
        <ul>
            <li>✅ 当在同一个群聊中时，不显示未读消息提示</li>
            <li>✅ 只有离开群聊后，新收到的消息才显示为未读</li>
            <li>✅ 重新进入群聊时，未读消息计数清零</li>
        </ul>
    </div>

    <div class="test-section">
        <h3>测试操作</h3>
        <button class="test-button" onclick="simulateNewMessage()">模拟收到新消息</button>
        <button class="test-button success" onclick="enterChatRoom()">进入群聊</button>
        <button class="test-button danger" onclick="leaveChatRoom()">离开群聊</button>
        <button class="test-button" onclick="clearLog()">清空日志</button>
        <button class="test-button warning" onclick="resetTest()">重置测试</button>
    </div>

    <div class="test-section">
        <h3>当前状态</h3>
        <div id="status" class="status info">准备开始测试...</div>
        <div id="currentState">
            <p><strong>当前状态：</strong> <span id="currentStatus">未进入群聊</span></p>
            <p><strong>未读消息：</strong> <span id="unreadCount">0</span></p>
            <p><strong>最后查看时间：</strong> <span id="lastSeen">-</span></p>
        </div>
    </div>

    <div class="chat-simulation">
        <div class="chat-window">
            <div class="chat-header">
                群聊A <span id="unreadBadge1" class="unread-badge" style="display: none;">0</span>
            </div>
            <div id="messages1">
                <div class="message received">欢迎来到群聊A！</div>
            </div>
        </div>
        
        <div class="chat-window">
            <div class="chat-header">
                群聊B <span id="unreadBadge2" class="unread-badge" style="display: none;">0</span>
            </div>
            <div id="messages2">
                <div class="message received">欢迎来到群聊B！</div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h3>测试日志</h3>
        <div id="log" class="log-area"></div>
    </div>

    <script>
        let logElement;
        let statusElement;
        let currentStatusElement;
        let unreadCountElement;
        let lastSeenElement;
        let unreadBadge1Element;
        let unreadBadge2Element;
        let messages1Element;
        let messages2Element;

        // 测试状态
        let currentChatRoom = null;
        let unreadMessages = { 'A': 0, 'B': 0 };
        let lastSeenTime = { 'A': null, 'B': null };

        window.addEventListener('DOMContentLoaded', function() {
            logElement = document.getElementById('log');
            statusElement = document.getElementById('status');
            currentStatusElement = document.getElementById('currentStatus');
            unreadCountElement = document.getElementById('unreadCount');
            lastSeenElement = document.getElementById('lastSeen');
            unreadBadge1Element = document.getElementById('unreadBadge1');
            unreadBadge2Element = document.getElementById('unreadBadge2');
            messages1Element = document.getElementById('messages1');
            messages2Element = document.getElementById('messages2');
            
            // 监听新消息事件
            window.addEventListener('newChatMessage', function(event) {
                const { courseId, message } = event.detail;
                log(`收到新消息事件: 课程ID=${courseId}, 发送者=${message.sender}, 内容=${message.content}`);
                
                // 模拟未读消息处理逻辑
                if (currentChatRoom !== courseId) {
                    // 不在当前群聊中，增加未读计数
                    const roomKey = courseId === 'A' ? 'A' : 'B';
                    unreadMessages[roomKey]++;
                    updateUnreadBadges();
                    log(`群聊 ${roomKey} 未读消息增加到: ${unreadMessages[roomKey]} (当前不在该群聊中)`);
                } else {
                    // 在当前群聊中，不增加未读计数
                    log(`群聊 ${courseId} 收到新消息，但当前正在该群聊中，不增加未读计数`);
                }
            });
            
            log('测试页面已加载，开始监听消息事件...');
            updateStatus('准备开始测试', 'info');
        });

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            statusElement.className = `status ${type}`;
            statusElement.textContent = message;
        }

        function updateUnreadBadges() {
            // 更新群聊A的未读徽章
            if (unreadMessages.A > 0) {
                unreadBadge1Element.textContent = unreadMessages.A;
                unreadBadge1Element.style.display = 'inline';
            } else {
                unreadBadge1Element.style.display = 'none';
            }
            
            // 更新群聊B的未读徽章
            if (unreadMessages.B > 0) {
                unreadBadge2Element.textContent = unreadMessages.B;
                unreadBadge2Element.style.display = 'inline';
            } else {
                unreadBadge2Element.style.display = 'none';
            }
            
            // 更新总未读计数
            const totalUnread = unreadMessages.A + unreadMessages.B;
            unreadCountElement.textContent = totalUnread;
        }

        function simulateNewMessage() {
            if (!currentChatRoom) {
                updateStatus('请先进入一个群聊', 'warning');
                return;
            }
            
            const roomKey = currentChatRoom;
            const messageContent = `这是来自群聊${roomKey}的新消息 - ${new Date().toLocaleTimeString()}`;
            
            // 添加消息到聊天窗口
            const messageElement = document.createElement('div');
            messageElement.className = 'message received';
            messageElement.textContent = messageContent;
            
            if (roomKey === 'A') {
                messages1Element.appendChild(messageElement);
            } else {
                messages2Element.appendChild(messageElement);
            }
            
            // 发送新消息事件
            window.dispatchEvent(new CustomEvent('newChatMessage', {
                detail: {
                    courseId: roomKey,
                    message: {
                        sender: '系统',
                        content: messageContent,
                        timestamp: new Date()
                    }
                }
            }));
            
            log(`模拟在群聊${roomKey}中发送新消息: ${messageContent}`);
            updateStatus(`已在群聊${roomKey}中发送新消息`, 'success');
        }

        function enterChatRoom() {
            if (currentChatRoom) {
                updateStatus(`已经在群聊${currentChatRoom}中`, 'warning');
                return;
            }
            
            // 选择进入群聊A
            currentChatRoom = 'A';
            currentStatusElement.textContent = `在群聊${currentChatRoom}中`;
            
            // 清零未读消息
            unreadMessages[currentChatRoom] = 0;
            lastSeenTime[currentChatRoom] = new Date();
            
            updateUnreadBadges();
            lastSeenElement.textContent = lastSeenTime[currentChatRoom].toLocaleString();
            
            log(`进入群聊${currentChatRoom}，未读消息清零`);
            updateStatus(`已进入群聊${currentChatRoom}，未读消息清零`, 'success');
        }

        function leaveChatRoom() {
            if (!currentChatRoom) {
                updateStatus('当前不在任何群聊中', 'warning');
                return;
            }
            
            const roomKey = currentChatRoom;
            log(`离开群聊${roomKey}`);
            
            // 更新最后查看时间
            lastSeenTime[roomKey] = new Date();
            lastSeenElement.textContent = lastSeenTime[roomKey].toLocaleString();
            
            currentChatRoom = null;
            currentStatusElement.textContent = '未进入群聊';
            
            updateStatus(`已离开群聊${roomKey}，现在可以接收未读消息`, 'info');
        }

        function clearLog() {
            logElement.innerHTML = '';
            updateStatus('日志已清空', 'info');
        }

        function resetTest() {
            currentChatRoom = null;
            unreadMessages = { 'A': 0, 'B': 0 };
            lastSeenTime = { 'A': null, 'B': null };
            
            currentStatusElement.textContent = '未进入群聊';
            unreadCountElement.textContent = '0';
            lastSeenElement.textContent = '-';
            
            updateUnreadBadges();
            
            // 清空消息
            messages1Element.innerHTML = '<div class="message received">欢迎来到群聊A！</div>';
            messages2Element.innerHTML = '<div class="message received">欢迎来到群聊B！</div>';
            
            log('测试已重置');
            updateStatus('测试已重置', 'info');
        }
    </script>
</body>
</html>
